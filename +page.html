<header class="hero hero__content" aria-labelledby="store-home-title">
	<h1 id="store-home-title" class="hero__title">Descubri productos increibles</h1>
	<p class="hero__subtitle">Explora nuestra seleccion curada con los mejores productos, envios a todo el pais y la mejor atencion.</p>
	<div class="hero__actions">
		<a id="hero-primary-link" class="btn btn--primary" href="/productos">
			<span>Explorar productos</span>
			<i data-lucide="arrow-right"></i>
		</a>
		<a id="hero-secondary-link" class="btn btn--secondary" href="/categorias">
			<i data-lucide="layout-grid"></i>
			<span>Explorar categorias</span>
		</a>
	</div>
	<div class="benefits-strip">
		<div class="hero-benefit">
			<i data-lucide="truck"></i>
			<span>Envios a todo el pais</span>
		</div>
		<div class="hero-benefit">
			<i data-lucide="shield-check"></i>
			<span>Compra segura</span>
		</div>
		<div class="hero-benefit">
			<i data-lucide="refresh-cw"></i>
			<span>Cambios sencillos</span>
		</div>
	</div>
</header>

<div class="home-sections">
	<div id="home-category-sections" class="home-sections__injected" aria-live="polite"></div>
	<div id="home-categories-list" aria-live="polite"></div>

	<section class="section" aria-labelledby="home-blog-title">
		<div class="section__header">
			<h2 id="home-blog-title" class="section__title section__title--large">Desde el blog</h2>
			<a class="section__action" href="/blog">
				Ver todos <i data-lucide="arrow-right" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-left:2px;"></i>
			</a>
		</div>
		<div id="home-blog-posts" class="blog-grid" aria-live="polite"></div>
	</section>
</div>

<script type="module" src="/index/script.js"></script>
