<store-breadcrumbs
	id="category-breadcrumbs"
	aria-label="Breadcrumb"
	items='[{"label":"Inicio","href":"/"}]'
	current-label="Categoria"
></store-breadcrumbs>

<section class="listing-head" aria-labelledby="category-title">
	<div class="listing-meta">
		<h1 id="category-title" class="page-title">Categoria</h1>
		<p id="category-description"></p>
	</div>
	<div class="listing-controls">
		<label for="category-sort-select">Orden</label>
		<select id="category-sort-select" aria-label="Orden de productos"></select>
	</div>
</section>

<div id="category-products" aria-live="polite"></div>

<script type="module" src="/categorias/[categoryId]/script.js"></script>
